<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주말 특근 신청</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f4f0;min-height:100vh;color:#1a1a1a}
.wrap{max-width:560px;margin:0 auto;padding:2rem 1rem 4rem}
.header{text-align:center;margin-bottom:2rem}
.header h1{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
.header p{font-size:13px;color:#888}
.tab-bar{display:flex;background:#fff;border-radius:12px;padding:4px;margin-bottom:1.5rem;border:1px solid #e8e6e0}
.tab{flex:1;padding:9px;font-size:13px;font-weight:500;border:none;background:none;border-radius:9px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:#888;transition:all .2s}
.tab.active{background:#1a1a1a;color:#fff}
.view{display:none}.view.active{display:block}
.card{background:#fff;border-radius:14px;border:1px solid #e8e6e0;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:600;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem}
.field{margin-bottom:.875rem}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:#666;margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 11px;font-size:14px;border:1px solid #e0ddd8;border-radius:9px;background:#fafaf8;color:#1a1a1a;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .15s}
.field input:focus,.field select:focus{border-color:#1a1a1a;background:#fff}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-submit{width:100%;padding:12px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:.25rem;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-submit:hover{opacity:.85}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}
.success{background:#f0faf4;border:1px solid #b6e8c8;border-radius:10px;padding:1rem;font-size:13px;color:#1a7f4b;text-align:center;margin-top:.75rem;display:none}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1rem}
.stat{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:.9rem 1rem}
.stat .s-label{font-size:11px;color:#aaa;margin-bottom:3px}
.stat .s-val{font-size:22px;font-weight:600}
.s-val.warn{color:#d97706}.s-val.ok{color:#059669}.s-val.bad{color:#dc2626}
.filter-bar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.fbtn{padding:5px 12px;font-size:12px;border:1px solid #e0ddd8;border-radius:100px;background:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:#888;transition:all .15s}
.fbtn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.list-header{display:grid;grid-template-columns:1fr 85px 95px 110px;gap:8px;padding:0 0 8px;font-size:11px;color:#aaa;font-weight:600;letter-spacing:.04em;border-bottom:1px solid #f0ede8;margin-bottom:4px}
.list-row{display:grid;grid-template-columns:1fr 85px 95px 110px;gap:8px;align-items:center;padding:11px 0;border-bottom:1px solid #f5f3ef;font-size:13px}
.list-row:last-child{border-bottom:none}
.pname{font-weight:500}.prank{font-size:11px;color:#aaa}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px}
.badge.pending{background:#fef3c7;color:#92400e}
.badge.approved{background:#d1fae5;color:#065f46}
.badge.rejected{background:#fee2e2;color:#991b1b}
.action-btns{display:flex;gap:4px;flex-wrap:wrap}
.abtn{padding:3px 8px;font-size:11px;font-weight:500;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:1px solid;transition:opacity .15s}
.abtn:hover{opacity:.7}
.abtn-ok{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.abtn-no{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.abtn-del{background:#f5f3ef;color:#aaa;border-color:#e0ddd8}
.empty{text-align:center;padding:2rem;font-size:13px;color:#bbb}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:99;padding:1rem}
.confirm-box{background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:300px;text-align:center}
.confirm-box p{font-size:14px;line-height:1.7;margin-bottom:1.25rem;color:#1a1a1a}
.confirm-btns{display:flex;gap:8px;justify-content:center}
.confirm-btns button{padding:8px 22px;font-size:13px;font-weight:500;border-radius:9px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:1px solid}
.cbtn-cancel{background:#f5f3ef;color:#555;border-color:#e0ddd8}
.cbtn-del{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;transition:transform .3s,opacity .3s;z-index:999;opacity:0;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.loading-row{text-align:center;padding:1.5rem;font-size:13px;color:#aaa}
.refresh-btn{float:right;padding:4px 10px;font-size:12px;border:1px solid #e0ddd8;border-radius:8px;background:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:#888}
.refresh-btn:hover{color:#1a1a1a;border-color:#1a1a1a}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>주말 특근 신청</h1>
    <p>신청 후 관리자 승인을 기다려 주세요</p>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('apply',this)">특근 신청</button>
    <button class="tab" onclick="switchTab('admin',this)">신청 현황</button>
  </div>

  <!-- 신청 탭 -->
  <div id="view-apply" class="view active">
    <div class="card">
      <div class="card-title">신청자 정보</div>
      <div class="row2">
        <div class="field"><label>이름</label><input type="text" id="f-name" placeholder="홍길동"></div>
        <div class="field"><label>직급</label>
          <select id="f-rank">
            <option value="">선택</option>
            <option>사원</option><option>대리</option><option>과장</option>
            <option>차장</option><option>부장</option>
          </select>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">특근 일정</div>
      <div class="row2">
        <div class="field"><label>특근 날짜</label><input type="date" id="f-date"></div>
        <div class="field"><label>특근 유형</label>
          <select id="f-type">
            <option value="">선택</option>
            <option>토요일 특근</option><option>일요일 특근</option><option>공휴일 특근</option>
          </select>
        </div>
      </div>
    </div>
    <button class="btn-submit" id="submit-btn" onclick="submitApply()">
      <span>신청 제출</span>
    </button>
    <div class="success" id="success-msg">✓ 신청이 완료되었습니다. 승인 결과를 기다려 주세요.</div>
  </div>

  <!-- 현황 탭 -->
  <div id="view-admin" class="view">
    <div class="stat-grid" id="stat-grid"></div>
    <div class="filter-bar">
      <button class="fbtn active" onclick="setFilter('all',this)">전체</button>
      <button class="fbtn" onclick="setFilter('대기 중',this)">대기 중</button>
      <button class="fbtn" onclick="setFilter('승인',this)">승인</button>
      <button class="fbtn" onclick="setFilter('반려',this)">반려</button>
      <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
    </div>
    <div class="card" style="padding:1rem 1.25rem">
      <div class="list-header">
        <span>신청자</span><span>날짜</span><span>유형</span><span>처리</span>
      </div>
      <div id="app-list"><div class="loading-row">불러오는 중...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbympS7X3OVgjBnky126ttrIx91x4jO4ZEmhfwmuRXr2eUh19VCnOwgrL-KgsPHXVNFb/exec';
var applications = [];
var currentFilter = 'all';
var pendingDeleteId = null;
var adminTabLoaded = false;

function switchTab(t, el) {
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  el.classList.add('active');
  document.getElementById('view-'+t).classList.add('active');
  if (t === 'admin' && !adminTabLoaded) {
    adminTabLoaded = true;
    loadData();
  }
}

function submitApply() {
  var name = document.getElementById('f-name').value.trim();
  var rank = document.getElementById('f-rank').value;
  var date = document.getElementById('f-date').value;
  var type = document.getElementById('f-type').value;
  if (!name||!rank||!date||!type) { showToast('모든 항목을 입력해 주세요.'); return; }

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.querySelector('span').textContent = '제출 중...';

  var params = new URLSearchParams();
  params.append('action', 'add');
  params.append('name', name);
  params.append('rank', rank);
  params.append('date', date);
  params.append('type', type);

  fetch(SCRIPT_URL, { method:'POST', body: params })
    .then(function(r){ return r.json(); })
    .then(function(d){
      btn.disabled = false;
      btn.querySelector('span').textContent = '신청 제출';
      if (d.result === 'success') {
        document.getElementById('f-name').value='';
        document.getElementById('f-rank').value='';
        document.getElementById('f-date').value='';
        document.getElementById('f-type').value='';
        var s = document.getElementById('success-msg');
        s.style.display='block';
        setTimeout(function(){s.style.display='none';}, 4000);
        adminTabLoaded = false;
      } else {
        showToast('오류가 발생했습니다. 다시 시도해 주세요.');
      }
    })
    .catch(function(){
      btn.disabled = false;
      btn.querySelector('span').textContent = '신청 제출';
      showToast('네트워크 오류가 발생했습니다.');
    });
}

function loadData() {
  document.getElementById('app-list').innerHTML = '<div class="loading-row">불러오는 중...</div>';
  var cbName = 'cb_' + Date.now();
  window[cbName] = function(d) {
    applications = d.data || [];
    renderDashboard();
    delete window[cbName];
    var s = document.getElementById('jsonp-script');
    if (s) s.remove();
  };
  var script = document.createElement('script');
  script.id = 'jsonp-script';
  script.src = SCRIPT_URL + '?action=get&callback=' + cbName;
  script.onerror = function() {
    document.getElementById('app-list').innerHTML = '<div class="empty">데이터를 불러오지 못했습니다.</div>';
  };
  document.head.appendChild(script);
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
  renderList();
}

function renderDashboard() {
  var total = applications.length;
  var pending = applications.filter(function(a){return a.status==='대기 중';}).length;
  var approved = applications.filter(function(a){return a.status==='승인';}).length;
  var rejected = applications.filter(function(a){return a.status==='반려';}).length;
  document.getElementById('stat-grid').innerHTML =
    '<div class="stat"><div class="s-label">전체 신청</div><div class="s-val">'+total+'</div></div>'+
    '<div class="stat"><div class="s-label">승인 대기</div><div class="s-val warn">'+pending+'</div></div>'+
    '<div class="stat"><div class="s-label">승인 완료</div><div class="s-val ok">'+approved+'</div></div>'+
    '<div class="stat"><div class="s-label">반려</div><div class="s-val bad">'+rejected+'</div></div>';
  renderList();
}

function renderList() {
  var list = applications.filter(function(a){return currentFilter==='all'||a.status===currentFilter;});
  var el = document.getElementById('app-list');
  if (list.length===0) { el.innerHTML='<div class="empty">해당 조건의 신청 내역이 없습니다.</div>'; return; }
  el.innerHTML = list.map(function(a){
    var statusClass = a.status==='대기 중'?'pending':a.status==='승인'?'approved':'rejected';
    var actionArea;
    if (a.status==='대기 중') {
      actionArea = '<div class="action-btns">'+
        '<button class="abtn abtn-ok" onclick="setStatus('+a.row+',\'승인\')">승인</button>'+
        '<button class="abtn abtn-no" onclick="setStatus('+a.row+',\'반려\')">반려</button>'+
        '<button class="abtn abtn-del" onclick="confirmDelete('+a.row+',\''+a.name+'\',\''+a.rank+'\')">삭제</button>'+
        '</div>';
    } else {
      actionArea = '<div class="action-btns">'+
        '<span class="badge '+statusClass+'">'+a.status+'</span>'+
        '<button class="abtn abtn-del" onclick="confirmDelete('+a.row+',\''+a.name+'\',\''+a.rank+'\')">삭제</button>'+
        '</div>';
    }
    return '<div class="list-row">'+
      '<div><div class="pname">'+a.name+'</div><div class="prank">'+a.rank+'</div></div>'+
      '<span style="font-size:12px">'+a.date+'</span>'+
      '<span style="font-size:12px">'+a.type+'</span>'+
      actionArea+
      '</div>';
  }).join('');
}

function setStatus(row, status) {
  var params = new URLSearchParams();
  params.append('action','update');
  params.append('row', row);
  params.append('status', status);
  fetch(SCRIPT_URL, {method:'POST', body:params})
    .then(function(r){return r.json();})
    .then(function(d){
      if (d.result==='success') { loadData(); showToast(status==='승인'?'승인 처리되었습니다.':'반려 처리되었습니다.'); }
    })
    .catch(function(){ showToast('처리 중 오류가 발생했습니다.'); });
}

function confirmDelete(row, name, rank) {
  pendingDeleteId = row;
  var overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'confirm-overlay';
  overlay.innerHTML = '<div class="confirm-box">'+
    '<p><strong>'+name+'</strong> ('+rank+') 님의<br>신청 내역을 삭제할까요?</p>'+
    '<div class="confirm-btns">'+
    '<button class="cbtn-cancel" onclick="closeConfirm()">취소</button>'+
    '<button class="cbtn-del" onclick="doDelete()">삭제</button>'+
    '</div></div>';
  document.body.appendChild(overlay);
}

function closeConfirm() {
  var o = document.getElementById('confirm-overlay');
  if (o) o.remove();
  pendingDeleteId = null;
}

function doDelete() {
  var params = new URLSearchParams();
  params.append('action','delete');
  params.append('row', pendingDeleteId);
  closeConfirm();
  fetch(SCRIPT_URL, {method:'POST', body:params})
    .then(function(r){return r.json();})
    .then(function(d){
      if (d.result==='success') { loadData(); showToast('삭제되었습니다.'); }
    })
    .catch(function(){ showToast('삭제 중 오류가 발생했습니다.'); });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 2500);
}
</script>
</body>
</html>
